# Replace .github/workflows/build.yaml in your libmpv-android fork with this.
# Adds Rust + cargo-c (for libdovi) to the upstream build. The only changes vs
# upstream are the "Setup Rust" + "Install cargo-c" steps before "Build".
name: Build libmpv-android (libdovi)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-c
        run: cargo install cargo-c

      - name: Symlink SDK
        working-directory: ./buildscripts
        run: |
          mkdir sdk
          ln -s ${ANDROID_HOME} ./sdk/android-sdk-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip python3-jinja2 gperf nasm
          sudo pip3 install --break-system-packages meson

      - name: Download dependencies
        working-directory: ./buildscripts
        env:
          IN_CI: 1
        run: ./download.sh

      - name: Apply patches
        working-directory: ./buildscripts
        run: ./patch.sh

      # Optional: drop "--arch arm64" to build all ABIs. arm64-v8a covers the
      # S25 Ultra and most modern devices; add x86_64 for the emulator.
      - name: Build
        working-directory: ./buildscripts
        run: ./build.sh

      - uses: actions/upload-artifact@v7
        with:
          name: libmpv-release.aar
          path: ./libmpv/build/outputs/aar/libmpv-release.aar
