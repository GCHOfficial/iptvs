name: Deploy panel

# Builds the web source panel (panel/) and publishes it to GitHub Pages.
# Runs only on pushes to main that touch the panel (the build step here is the
# panel's only validation; it's a static site with no separate test suite).
on:
  push:
    branches: [main]
    paths:
      - 'panel/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow this workflow to publish Pages; concurrency keeps one live deploy.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: panel/package-lock.json
      - run: npm ci
        working-directory: panel
      - name: Build
        working-directory: panel
        # Anon/publishable values only — set as repo Variables (Settings →
        # Secrets and variables → Actions → Variables). Never service_role.
        env:
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
        run: npm run build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: panel/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
