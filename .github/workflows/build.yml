name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Supersede in-flight runs for the same branch/PR (a force-push or rapid pushes
# shouldn't keep older builds burning minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo (releases live in release.yml).
permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.5

jobs:
  # Fast gate: static analysis + the pure-logic / persistence unit tests. Always
  # runs (incl. doc-only commits) so it stays a stable required status check.
  analyze-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # The persistence tests use sqflite_common_ffi, which loads the system
      # libsqlite3 at runtime; the channel-list focus tests build a media_kit
      # preview player, which needs libmpv (MediaKit.ensureInitialized).
      - name: Install native test deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0 libmpv-dev
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # Skip the heavy platform builds on doc-only commits (README/CLAUDE.md/memory).
  # `code` is an allowlist of paths that actually affect a build.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          # Empty token = detect changes with local git instead of the REST
          # changed-files API (the action fetches and deepens to the merge
          # base itself). The API path failed whole PR runs during GitHub
          # REST outages (503s), and git needs no pull-requests permission.
          token: ''
          filters: |
            code:
              - 'lib/**'
              - 'test/**'
              - 'android/**'
              - 'windows/**'
              - 'ios/**'
              - 'linux/**'
              - 'macos/**'
              - 'web/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'analysis_options.yaml'
              - '.github/workflows/**'

  # Compile non-distributable debug APKs for every Android distribution. These
  # smoke builds catch flavor/manifest identity regressions without exposing a
  # release or upload key. Distributable artifacts are produced exclusively by
  # protected workflows with certificate verification.
  build-android:
    name: Build Android smoke APK (phone + TV)
    needs: [analyze-test, changes]
    # Not on push-to-main: "require branches up to date" means the PR already
    # built this exact tree, and these platform builds aren't required checks, so
    # rebuilding them on the merge commit is pure duplication. analyze-test still
    # runs on main as the required health check.
    if: needs.changes.outputs.code == 'true' && github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Pull the libdovi libmpv AAR (android/app/libs/libmpv-dovi.aar).
          lfs: true
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - run: flutter pub get
      - name: Build non-distributable development APK
        # Cloud-sync config (repo Variables; empty in forks → feature stays off).
        run: flutter build apk --debug --flavor development --build-number ${{ github.run_number }} --dart-define=DISTRIBUTION_CHANNEL=development --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}
      - name: Verify development manifest excludes self-update capability
        run: ./tool/verify_android_distribution_manifest.sh build/app/outputs/flutter-apk/app-development-debug.apk development
      - name: Build non-distributable GitHub-direct APK
        run: flutter build apk --debug --flavor githubDirect --build-number ${{ github.run_number }} --dart-define=DISTRIBUTION_CHANNEL=githubDirect
      - name: Verify GitHub-direct identity and updater capability
        run: ./tool/verify_android_distribution_manifest.sh build/app/outputs/flutter-apk/app-githubdirect-debug.apk githubDirect
      - name: Verify Android certificate parser against the debug APK
        run: ./tool/verify_android_apk_certificate.sh build/app/outputs/flutter-apk/app-githubdirect-debug.apk CF:3C:C3:53:C7:02:B4:D5:48:E7:4C:75:32:25:61:2C:4E:AA:D9:4A:E0:E9:FB:D4:1C:BE:4A:C6:9C:85:3E:EC
      - name: Build non-distributable Google Play APK
        run: flutter build apk --debug --flavor googlePlay --build-number ${{ github.run_number }} --dart-define=DISTRIBUTION_CHANNEL=googlePlay --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}
      - name: Verify Google Play identity excludes self-update capability
        run: ./tool/verify_android_distribution_manifest.sh build/app/outputs/flutter-apk/app-googleplay-debug.apk googlePlay

  # Windows desktop build. The libplacebo/Dolby-Vision libmpv-2.dll is fetched +
  # hash-verified automatically by windows/CMakeLists.txt at configure time; we
  # cache it (keyed on the URL+SHA that live in that file) so it's fetched once.
  build-windows:
    name: Build Windows
    needs: [analyze-test, changes]
    # Not on push-to-main: "require branches up to date" means the PR already
    # built this exact tree, and these platform builds aren't required checks, so
    # rebuilding them on the merge commit is pure duplication. analyze-test still
    # runs on main as the required health check.
    if: needs.changes.outputs.code == 'true' && github.event_name != 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Cache libmpv DLL
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: windows/libmpv/libmpv-2.dll
          key: libmpv-dll-${{ hashFiles('windows/CMakeLists.txt') }}
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - name: Exercise Windows updater rejection and rollback
        run: flutter test test/windows_update_script_test.dart
      - name: Build release (Windows x64)
        run: flutter build windows --release --build-number ${{ github.run_number }} --dart-define=DISTRIBUTION_CHANNEL=development --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}
      - name: Package build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath iptvs-windows-x64.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iptvs-windows-x64
          path: iptvs-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux AppImage
    needs: [analyze-test, changes]
    # Not on push-to-main: "require branches up to date" means the PR already
    # built this exact tree, and these platform builds aren't required checks, so
    # rebuilding them on the merge commit is pure duplication. analyze-test still
    # runs on main as the required health check.
    if: needs.changes.outputs.code == 'true' && github.event_name != 'push'
    # The AppImage no longer bundles mpv (Noble's system mpv is 0.37, which has
    # no Wayland HDR and exits on --target-colorspace-hint=auto, added in 0.41)
    # — LinuxNativeSession discovers and version-gates the *host's* mpv at
    # runtime (>=0.40 required, 0.41 recommended) and falls back to the
    # embedded media_kit/libmpv SDR path otherwise. `mpv` stays installed here
    # only so the embedded fallback build has libmpv-dev to link against.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libmpv-dev mpv libsecret-1-dev libepoxy-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - name: Build release (Linux x86-64)
        run: flutter build linux --release --build-number ${{ github.run_number }} --dart-define=DISTRIBUTION_CHANNEL=development --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}
      - name: Fetch pinned linuxdeploy
        run: |
          curl -fL --retry 3 -o "$RUNNER_TEMP/linuxdeploy-x86_64.AppImage" https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20250213-2/linuxdeploy-x86_64.AppImage
          echo '4648f278ab3ef31f819e67c30d50f462640e5365a77637d7e6f2ad9fd0b4522a  '${RUNNER_TEMP}'/linuxdeploy-x86_64.AppImage' | sha256sum --check
          chmod +x "$RUNNER_TEMP/linuxdeploy-x86_64.AppImage"
          curl -fL --retry 3 -o "$RUNNER_TEMP/appimagetool-x86_64.AppImage" https://github.com/AppImage/AppImageKit/releases/download/12/appimagetool-x86_64.AppImage
          echo 'd918b4df547b388ef253f3c9e7f6529ca81a885395c31f619d9aaf7030499a13  '${RUNNER_TEMP}'/appimagetool-x86_64.AppImage' | sha256sum --check
          chmod +x "$RUNNER_TEMP/appimagetool-x86_64.AppImage"
          curl -fL --retry 3 -o "$RUNNER_TEMP/runtime-x86_64" https://github.com/AppImage/type2-runtime/releases/download/20251108/runtime-x86_64
          echo '2fca8b443c92510f1483a883f60061ad09b46b978b2631c807cd873a47ec260d  '${RUNNER_TEMP}'/runtime-x86_64' | sha256sum --check
      - name: Package AppImage smoke artifact
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
          LINUXDEPLOY: ${{ runner.temp }}/linuxdeploy-x86_64.AppImage
          APPIMAGETOOL: ${{ runner.temp }}/appimagetool-x86_64.AppImage
          APPIMAGE_RUNTIME_FILE: ${{ runner.temp }}/runtime-x86_64
        run: ./tool/package_linux_appimage.sh 0.0.0 build/linux/x64/release/bundle
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: iptvs-linux-x86_64
          path: iptvs-0.0.0-linux-x86_64.AppImage
          if-no-files-found: error
