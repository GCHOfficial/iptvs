name: Release

# Cut a release by pushing a tag like `v1.2.3`, or run manually (workflow_dispatch)
# with a version. Builds Windows, Linux, and Android and publishes a GitHub
# Release with the artifacts attached and auto-generated notes.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading v (e.g. 1.2.3)'
        required: true
      track:
        description: 'Publish as a stable release or signed beta prerelease'
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.5
  MINIMUM_UPDATE_VERSION: 0.1.0

jobs:
  # Resolve the version string once (tag minus the leading `v`, or the manual input).
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      track: ${{ steps.v.outputs.track }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "track=${{ inputs.track }}" >> "$GITHUB_OUTPUT"
          else
            tag="${{ github.ref_name }}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            echo "track=stable" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    name: Build Android (phone + TV)
    needs: version
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          lfs: true # libdovi libmpv AAR (android/app/libs/libmpv-dovi.aar)
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - run: flutter pub get
      - name: Prepare protected Android signing key
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          missing=0
          for name in ANDROID_RELEASE_KEYSTORE_BASE64 ANDROID_RELEASE_KEYSTORE_PASSWORD ANDROID_RELEASE_KEY_ALIAS ANDROID_RELEASE_KEY_PASSWORD ANDROID_RELEASE_CERT_SHA256; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured in the protected release environment."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/iptvs-release.jks"
      - name: Build release APK
        # Cloud-sync config (repo Variables; empty in forks → feature stays off).
        env:
          IPTVS_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/iptvs-release.jks
          IPTVS_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          IPTVS_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          IPTVS_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: flutter build apk --release --flavor githubDirect --build-name ${{ needs.version.outputs.version }} --build-number ${{ github.run_number }} --dart-define=DISTRIBUTION_CHANNEL=githubDirect --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }} --dart-define=UPDATE_MANIFEST_PUBLIC_KEY=${{ vars.UPDATE_MANIFEST_PUBLIC_KEY }}
      - name: Verify Android signing certificate
        env:
          EXPECTED_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: ./tool/verify_android_apk_certificate.sh build/app/outputs/flutter-apk/app-githubdirect-release.apk "$EXPECTED_CERT_SHA256"
      - name: Name artifact
        run: cp build/app/outputs/flutter-apk/app-githubdirect-release.apk iptvs-${{ needs.version.outputs.version }}-android.apk
      - name: Verify GitHub-direct updater manifest capability
        run: ./tool/verify_android_distribution_manifest.sh iptvs-${{ needs.version.outputs.version }}-android.apk githubDirect
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android
          path: iptvs-${{ needs.version.outputs.version }}-android.apk
          if-no-files-found: error

  build-windows:
    name: Build Windows
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Cache libmpv DLL
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: windows/libmpv/libmpv-2.dll
          key: libmpv-dll-${{ hashFiles('windows/CMakeLists.txt') }}
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - name: Build release (Windows x64)
        run: flutter build windows --release --build-name ${{ needs.version.outputs.version }} --build-number ${{ github.run_number }} --dart-define=DISTRIBUTION_CHANNEL=githubDirect --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }} --dart-define=UPDATE_MANIFEST_PUBLIC_KEY=${{ vars.UPDATE_MANIFEST_PUBLIC_KEY }}
      - name: Package build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath iptvs-${{ needs.version.outputs.version }}-windows-x64.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows
          path: iptvs-${{ needs.version.outputs.version }}-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux AppImage
    needs: version
    # The AppImage no longer bundles mpv (Noble's system mpv is 0.37, which has
    # no Wayland HDR and exits on --target-colorspace-hint=auto, added in 0.41)
    # — LinuxNativeSession discovers and version-gates the *host's* mpv at
    # runtime (>=0.40 required, 0.41 recommended) and falls back to the
    # embedded media_kit/libmpv SDR path otherwise. `mpv` stays installed here
    # only so the embedded fallback build has libmpv-dev to link against.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libmpv-dev mpv libsecret-1-dev libepoxy-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - name: Build release (Linux x86-64)
        run: flutter build linux --release --build-name ${{ needs.version.outputs.version }} --build-number ${{ github.run_number }} --dart-define=DISTRIBUTION_CHANNEL=githubDirect --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }} --dart-define=UPDATE_MANIFEST_PUBLIC_KEY=${{ vars.UPDATE_MANIFEST_PUBLIC_KEY }}
      - name: Fetch pinned linuxdeploy
        run: |
          curl -fL --retry 3 -o "$RUNNER_TEMP/linuxdeploy-x86_64.AppImage" https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20250213-2/linuxdeploy-x86_64.AppImage
          echo '4648f278ab3ef31f819e67c30d50f462640e5365a77637d7e6f2ad9fd0b4522a  '${RUNNER_TEMP}'/linuxdeploy-x86_64.AppImage' | sha256sum --check
          chmod +x "$RUNNER_TEMP/linuxdeploy-x86_64.AppImage"
          curl -fL --retry 3 -o "$RUNNER_TEMP/appimagetool-x86_64.AppImage" https://github.com/AppImage/AppImageKit/releases/download/12/appimagetool-x86_64.AppImage
          echo 'd918b4df547b388ef253f3c9e7f6529ca81a885395c31f619d9aaf7030499a13  '${RUNNER_TEMP}'/appimagetool-x86_64.AppImage' | sha256sum --check
          chmod +x "$RUNNER_TEMP/appimagetool-x86_64.AppImage"
          curl -fL --retry 3 -o "$RUNNER_TEMP/runtime-x86_64" https://github.com/AppImage/type2-runtime/releases/download/20251108/runtime-x86_64
          echo '2fca8b443c92510f1483a883f60061ad09b46b978b2631c807cd873a47ec260d  '${RUNNER_TEMP}'/runtime-x86_64' | sha256sum --check
      - name: Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
          LINUXDEPLOY: ${{ runner.temp }}/linuxdeploy-x86_64.AppImage
          APPIMAGETOOL: ${{ runner.temp }}/appimagetool-x86_64.AppImage
          APPIMAGE_RUNTIME_FILE: ${{ runner.temp }}/runtime-x86_64
        run: ./tool/package_linux_appimage.sh ${{ needs.version.outputs.version }} build/linux/x64/release/bundle
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux
          path: iptvs-${{ needs.version.outputs.version }}-linux-x86_64.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [version, build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history — the changelog step diffs against the previous tag
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true
      - name: Create and sign release manifest
        env:
          UPDATE_MANIFEST_PRIVATE_KEY_BASE64: ${{ secrets.UPDATE_MANIFEST_PRIVATE_KEY_BASE64 }}
          UPDATE_MANIFEST_PRIVATE_KEY_PASSWORD: ${{ secrets.UPDATE_MANIFEST_PRIVATE_KEY_PASSWORD }}
          UPDATE_MANIFEST_PUBLIC_KEY: ${{ vars.UPDATE_MANIFEST_PUBLIC_KEY }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$UPDATE_MANIFEST_PRIVATE_KEY_BASE64" ] || [ -z "$UPDATE_MANIFEST_PRIVATE_KEY_PASSWORD" ] || [ -z "$UPDATE_MANIFEST_PUBLIC_KEY" ]; then
            echo "::error::Update manifest signing key is not configured in the release environment."
            exit 1
          fi
          android="dist/iptvs-$VERSION-android.apk"
          windows="dist/iptvs-$VERSION-windows-x64.zip"
          linux="dist/iptvs-$VERSION-linux-x86_64.AppImage"
          for artifact in "$android" "$windows" "$linux"; do
            if [ ! -f "$artifact" ]; then
              echo "::error::Missing release artifact: $artifact"
              exit 1
            fi
          done
          key="$RUNNER_TEMP/update-manifest-ed25519.pem"
          printf '%s' "$UPDATE_MANIFEST_PRIVATE_KEY_BASE64" | base64 --decode > "$key"
          chmod 600 "$key"
          derived_public=$(openssl pkey -in "$key" -passin env:UPDATE_MANIFEST_PRIVATE_KEY_PASSWORD -pubout -outform DER | tail -c 32 | base64 -w0)
          if [ "$derived_public" != "$UPDATE_MANIFEST_PUBLIC_KEY" ]; then
            echo "::error::Update manifest public and private keys do not match."
            exit 1
          fi
          manifest="dist/iptvs-$VERSION-manifest.json"
          # TEMPORARY (0.1.39 rescue): the signed manifest lists only
          # android + windows-x64, NOT linux-x86_64 — even though the Linux
          # AppImage is still built and uploaded as a release asset above.
          # Every <=0.1.37 client's parser accepts only {android, windows-x64}
          # and threw 'Unsupported release platform' on 0.1.38's linux entry,
          # rejecting the whole manifest and bricking auto-update on all
          # platforms. Omitting linux here lets those clients parse /latest and
          # update onto the skip-unknown parser. Linux installs are all 0.1.38+
          # (tolerant parser -> a missing entry is 'no asset', not a crash) and
          # update manually once. RESTORE the linux-x86_64 artifact (revert this
          # block to the 3-platform jq below) in 0.1.40+ once the pre-fix cohort
          # has drained. See docs/updates.md "Adding a release platform".
          jq -cn \
            --arg version "$VERSION" \
            --arg minimum "$MINIMUM_UPDATE_VERSION" \
            --arg android_name "$(basename "$android")" \
            --arg android_sha "$(sha256sum "$android" | cut -d ' ' -f 1)" \
            --argjson android_size "$(stat -c '%s' "$android")" \
            --arg windows_name "$(basename "$windows")" \
            --arg windows_sha "$(sha256sum "$windows" | cut -d ' ' -f 1)" \
            --argjson windows_size "$(stat -c '%s' "$windows")" \
            '{schema:1,version:$version,minimum_version:$minimum,artifacts:[{platform:"android",filename:$android_name,byte_size:$android_size,sha256:$android_sha},{platform:"windows-x64",filename:$windows_name,byte_size:$windows_size,sha256:$windows_sha}]}' \
            > "$manifest"
          # Restore for 0.1.40+ (re-add linux-x86_64):
          #   --arg linux_name "$(basename "$linux")" \
          #   --arg linux_sha "$(sha256sum "$linux" | cut -d ' ' -f 1)" \
          #   --argjson linux_size "$(stat -c '%s' "$linux")" \
          #   ... ,{platform:"linux-x86_64",filename:$linux_name,byte_size:$linux_size,sha256:$linux_sha}]}
          openssl pkeyutl -sign -rawin -inkey "$key" -passin env:UPDATE_MANIFEST_PRIVATE_KEY_PASSWORD -in "$manifest" -out "$RUNNER_TEMP/manifest.sig"
          base64 -w0 "$RUNNER_TEMP/manifest.sig" > "$manifest.sig"
          rm -f "$key" "$RUNNER_TEMP/manifest.sig"
      # A short human-readable changelog generated by Gemini from the commit
      # subjects since the previous tag. Tries a chain of models (the primary
      # 503s under load — it cut v0.1.29 with no changelog), two attempts each.
      # Fail-open: with no GEMINI_API_KEY (e.g. forks), no previous tag, or
      # every model failing, the release publishes with just GitHub's
      # auto-generated notes (body.md stays empty). The body also feeds the
      # in-app update dialog (ReleaseInfo.notes → ReleaseNotesView).
      - name: Generate AI changelog
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.version.outputs.version) || github.ref_name }}
        run: |
          : > body.md
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not set; skipping AI changelog."
            exit 0
          fi
          ref="$RELEASE_TAG"
          git rev-parse -q --verify "$ref" >/dev/null || ref=HEAD
          prev=$(git describe --tags --abbrev=0 "$ref^" 2>/dev/null || true)
          if [ -n "$prev" ]; then
            commits=$(git log --no-merges --pretty='- %s' "$prev".."$ref")
          else
            commits=$(git log --no-merges --pretty='- %s' "$ref")
          fi
          if [ -z "$commits" ]; then
            echo "No commits found; skipping AI changelog."
            exit 0
          fi
          prompt="You write release changelogs for iptvs, a cross-platform IPTV player app (Windows, Android phone + TV). Summarize the following commit subjects into a short user-facing changelog in GitHub markdown: 3-8 bullet points under a '## Highlights' heading, plain language a user understands, grouped by theme. Never write filler like 'bug fixes and improvements'; describe what actually changed and why a user cares. Use only this markdown: '##' headings, '-' bullets (at most one nesting level), and **bold** emphasis — no tables, no code blocks, no links, no images. No commit hashes, no PR numbers, no preamble before or after the markdown. Commits:
          $commits"
          jq -n --arg p "$prompt" \
            '{contents: [{parts: [{text: $p}]}], generationConfig: {temperature: 0.3}}' > request.json
          for model in gemini-3.5-flash gemini-3.1-flash-lite gemini-3-flash-preview; do
            for attempt in 1 2; do
              if curl -sS --fail-with-body --max-time 120 \
                  -H 'Content-Type: application/json' \
                  -H "x-goog-api-key: $GEMINI_API_KEY" \
                  -d @request.json \
                  "https://generativelanguage.googleapis.com/v1beta/models/$model:generateContent" \
                  > response.json; then
                jq -r '.candidates[0].content.parts[0].text // empty' response.json > body.md || : > body.md
                if [ -s body.md ]; then
                  echo "Changelog generated by $model (attempt $attempt)."
                  break 2
                fi
                echo "$model attempt $attempt returned an empty changelog."
              else
                echo "$model attempt $attempt failed:"
                cat response.json 2>/dev/null || true
                echo
              fi
              sleep 5
            done
          done
          if [ ! -s body.md ]; then
            echo "All models failed; continuing without AI changelog."
            : > body.md
          fi
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.version.outputs.version) || github.ref_name }}
          RELEASE_NAME: IPTVS Player ${{ needs.version.outputs.version }}${{ needs.version.outputs.track == 'beta' && ' Beta' || '' }}
          RELEASE_TRACK: ${{ needs.version.outputs.track }}
        run: |
          set -euo pipefail

          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -lt 5 ]; then
                echo "Attempt $attempt failed; retrying in $((attempt * 10))s."
                sleep $((attempt * 10))
              fi
            done
            return 1
          }

          # Probe existence via the REST status code. `gh release view` is
          # unusable here: it reports "release not found" for *any* REST
          # failure (a 503 during an API outage looks identical to a real
          # 404), which would misroute an existing release into `create`
          # and a persistent "already exists" failure. With `gh api`, a
          # real 404 answers immediately; anything else is transient and
          # goes back through retry.
          exists=""
          probe_release() {
            local err
            if err=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --silent 2>&1); then
              exists=yes
              return 0
            fi
            if grep -q "HTTP 404" <<<"$err"; then
              exists=no
              return 0
            fi
            printf '%s\n' "$err" >&2
            return 1
          }
          retry probe_release

          if [ "$exists" = yes ]; then
            edit_args=("$RELEASE_TAG" --title "$RELEASE_NAME")
            # Keep the existing notes when the AI changelog came back empty
            # (fail-open) — an empty --notes-file would wipe them.
            if [ -s body.md ]; then
              edit_args+=(--notes-file body.md)
            fi
            if [ "$RELEASE_TRACK" = beta ]; then
              edit_args+=(--prerelease)
            fi
            retry gh release edit "${edit_args[@]}"
          else
            create_args=("$RELEASE_TAG" --verify-tag --title "$RELEASE_NAME" --notes-file body.md --generate-notes)
            if [ "$RELEASE_TRACK" = beta ]; then
              create_args+=(--prerelease)
            fi
            retry gh release create "${create_args[@]}"
          fi

          retry gh release upload "$RELEASE_TAG" dist/* --clobber
