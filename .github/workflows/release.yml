name: Release

# Cut a release by pushing a tag like `v1.2.3`, or run manually (workflow_dispatch)
# with a version. Builds Windows + Android and publishes a GitHub Release with both
# artifacts attached and auto-generated notes.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading v (e.g. 1.2.3)'
        required: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.44.5

jobs:
  # Resolve the version string once (tag minus the leading `v`, or the manual input).
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${{ github.ref_name }}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    name: Build Android (phone + TV)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true # libdovi libmpv AAR (android/app/libs/libmpv-dovi.aar)
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - run: flutter pub get
      - name: Build release APK
        # Cloud-sync config (repo Variables; empty in forks → feature stays off).
        run: flutter build apk --release --build-name ${{ needs.version.outputs.version }} --build-number ${{ github.run_number }} --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}
      - name: Name artifact
        run: cp build/app/outputs/flutter-apk/app-release.apk iptvs-${{ needs.version.outputs.version }}-android.apk
      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: iptvs-${{ needs.version.outputs.version }}-android.apk
          if-no-files-found: error

  build-windows:
    name: Build Windows
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Cache libmpv DLL
        uses: actions/cache@v6
        with:
          path: windows/libmpv/libmpv-2.dll
          key: libmpv-dll-${{ hashFiles('windows/CMakeLists.txt') }}
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - name: Build release (Windows x64)
        run: flutter build windows --release --build-name ${{ needs.version.outputs.version }} --build-number ${{ github.run_number }} --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}
      - name: Package build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath iptvs-${{ needs.version.outputs.version }}-windows-x64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: iptvs-${{ needs.version.outputs.version }}-windows-x64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [version, build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the changelog step diffs against the previous tag
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      # A short human-readable changelog generated by Gemini from the commit
      # subjects since the previous tag. Fail-open: with no GEMINI_API_KEY (e.g.
      # forks), no previous tag, or an API error the release publishes with just
      # GitHub's auto-generated notes (body.md stays empty). The body also feeds
      # the in-app update dialog (ReleaseInfo.notes → ReleaseNotesView).
      - name: Generate AI changelog
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.version.outputs.version) || github.ref_name }}
        run: |
          : > body.md
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not set; skipping AI changelog."
            exit 0
          fi
          ref="$RELEASE_TAG"
          git rev-parse -q --verify "$ref" >/dev/null || ref=HEAD
          prev=$(git describe --tags --abbrev=0 "$ref^" 2>/dev/null || true)
          if [ -n "$prev" ]; then
            commits=$(git log --no-merges --pretty='- %s' "$prev".."$ref")
          else
            commits=$(git log --no-merges --pretty='- %s' "$ref")
          fi
          if [ -z "$commits" ]; then
            echo "No commits found; skipping AI changelog."
            exit 0
          fi
          prompt="You write release changelogs for iptvs, a cross-platform IPTV player app (Windows, Android phone + TV). Summarize the following commit subjects into a short user-facing changelog in GitHub markdown: 3-8 bullet points under a '## Highlights' heading, plain language a user understands, grouped by theme. Never write filler like 'bug fixes and improvements'; describe what actually changed and why a user cares. Use only this markdown: '##' headings, '-' bullets (at most one nesting level), and **bold** emphasis — no tables, no code blocks, no links, no images. No commit hashes, no PR numbers, no preamble before or after the markdown. Commits:
          $commits"
          jq -n --arg p "$prompt" \
            '{contents: [{parts: [{text: $p}]}], generationConfig: {temperature: 0.3}}' > request.json
          if curl -sS --fail-with-body --max-time 120 \
              -H 'Content-Type: application/json' \
              -H "x-goog-api-key: $GEMINI_API_KEY" \
              -d @request.json \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent" \
              > response.json; then
            jq -r '.candidates[0].content.parts[0].text // empty' response.json > body.md || : > body.md
          else
            echo "Gemini API call failed; continuing without AI changelog."
            cat response.json 2>/dev/null || true
          fi
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.version.outputs.version) || github.ref_name }}
          name: iptvs ${{ needs.version.outputs.version }}
          body_path: body.md
          generate_release_notes: true
          files: dist/**
