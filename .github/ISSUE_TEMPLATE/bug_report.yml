name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Do not include provider URLs, credentials, MAC
        addresses, or tokens** — iptvs redacts these from logs, and you should too.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Play ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Windows
        - Android (phone/tablet)
        - Android TV
        - Other
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider type
      options:
        - Stalker (MAG portal)
        - Xtream Codes
        - M3U / M3U8
        - Demo source
        - Not applicable
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Found in the app, or the release/commit you built from.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Diagnostics / logs
      description: >
        Exported diagnostics or relevant log lines. These are auto-redacted, but
        double-check before pasting.
      render: text
    validations:
      required: false
