<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e0f13"/>
      <stop offset="1" stop-color="#19152f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9185ff"/>
      <stop offset="1" stop-color="#6857ed"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#7b6cf6" stop-opacity=".4"/>
      <stop offset="1" stop-color="#7b6cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#background)"/>
  <circle cx="640" cy="360" r="520" fill="url(#glow)"/>
  <g opacity=".28" fill="none" stroke="#7b6cf6">
    <circle cx="640" cy="360" r="270"/>
    <circle cx="640" cy="360" r="340"/>
    <circle cx="640" cy="360" r="420"/>
  </g>

  <g filter="url(#shadow)" transform="translate(500 142)">
    <rect width="280" height="280" rx="70" fill="url(#accent)"/>
    <path d="M112 77 207 140 112 203Z" fill="#fff"/>
  </g>
  <text x="640" y="518" text-anchor="middle" fill="#fff"
        font-family="Inter,Arial,sans-serif" font-size="68" font-weight="700">IPTVS Player</text>
  <text x="640" y="570" text-anchor="middle" fill="#b7b4c2"
        font-family="Inter,Arial,sans-serif" font-size="26">Your sources. One focused player.</text>
</svg>
